workflows:
  ios-workflow:
    name: SurfaceMusic iOS
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Build IPA
        script: |
          cd assurance
          flutter build ipa --release --no-codesign
    artifacts:
      - assurance/build/ios/ipa/*.ipa
      - assurance/build/ios/archive/*.xcarchive
      - "**/*.ipa"
      - "**/*.app"