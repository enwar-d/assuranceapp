name: assurance_wireless
description: Unofficial Assurance Wireless MyAccount app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView for loading the MyAccount site
  webview_flutter: ^4.7.0

  # Opens the sign-up URL in external browser
  url_launcher: ^6.3.0

  # Auto-generates all app icon sizes for iOS and Android
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# ── App Icon Config ────────────────────────────────────────────────────────────
flutter_launcher_icons:
  ios: true
  android: false
  image_path: "assets/icon.png"
  min_sdk_android: 21

# ── Flutter Assets ─────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true
  assets:
    - assets/Assurance_Wireless_logo.png
    - assets/icon.png