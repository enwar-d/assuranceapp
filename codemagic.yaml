workflows:
  ios-workflow:
    name: Assurance
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Flutter pub get
        script: |
          cd assurance && flutter pub get

      - name: Pod install
        script: |
          cd assurance/ios && pod install

      - name: Build IPA
        script: |
          cd assurance && flutter build ipa --release --no-codesign

    artifacts:
      - assurance/build/ios/ipa/*.ipa
      - assurance/build/ios/archive/*.xcarchive

    publishing:
      email:
        recipients:
          - enwar.d@outlook.com
        notify:
          success: true
          failure: true